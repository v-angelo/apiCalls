<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API: Random Quotes</title>
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <link rel="stylesheet" href="./main.css">
</head>

<body class="bg-gray-950 text-white h-[calc(100vh-12px)] flex justify-center items-center">
    <main class="flex flex-col justify-center items-center mt-3">
        <h1 class="text-5xl font-semibold text-green-900 mb-7">Random Quote Generator!</h1>
        <form id="countryForm" class="flex justify-center gap-4 w-full">
            <button type="button" onclick="displayQuote()" class="bg-blue-800 py-2 px-3 rounded cursor-pointer">Generate Quote</button>
        </form>
        <!-- Random Quote -->
        <div id="quoteID"></div>
    </main>
</body>
<script defer>
    // Random color generator
    const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'pink', 'indigo', 'gray', 'teal', 'amber'];
    const shades = ['100', '200', '300', '400', '500', '600', '700', '800', '900'];

    const getRandomColorClass = () => {
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        const randomShade = shades[Math.floor(Math.random() * shades.length)];
        return `text-${randomColor}-${randomShade}`;
    };

    // Async Function
    const displayQuote = async () => {
        try {
            const response = await fetch("https://dummyjson.com/quotes");
            const serverData = await response.json();
            const allQuotes = serverData.quotes;
            console.log(allQuotes);
            const random = Math.floor(Math.random() * allQuotes.length);
            const randomQuote = allQuotes[random];
            console.log(randomQuote);
            quoteID.innerHTML = `
            <section  class="border border-white/20 w-4xl rounded-xl p-5 my-5 text-center">
                <h3 class="text-2xl font-semibold ${getRandomColorClass()}">Today's Quote</h3>
                <h3 class="text-3xl font-semibold my-5 ${getRandomColorClass()}">${randomQuote.quote}</h3>
                <h5 class="text-lg ${getRandomColorClass()}">By ${randomQuote.author}</h5>
            </section>    
            `
        } catch (err) {
            console.log(err);
            console.log("API call failed!");
        }
    }
    // document.getElementById("quoteBtn").addEventListener("click", displayQuote);
</script>

</html>
