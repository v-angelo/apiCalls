<script>
    const id = JSON.parse(sessionStorage.getItem("id"));
    console.log(id);

    const viewRecipe = async () => {
        const response = await fetch(`https://dummyjson.com/recipes/${id}`);
        const recipeDetails = await response.json();
        console.log(recipeDetails);
        result.innerHTML = `
        <div class="container px-4 px-lg-5 my-5">
                <div class="row gx-4 gx-lg-5 align-items-center">
                    <div class="col-md-6"><img class="card-img-top mb-5 mb-md-0" src="${recipeDetails.image}" alt="..." /></div>
                    <div class="col-md-6">
                        <div class="small mb-1">Meal Type: ${recipeDetails.mealType}, Difficulty: ${recipeDetails.difficulty}</div>
                        <h1 class="display-5 fw-bolder">${recipeDetails.name}</h1>
                        <div class="fs-5 mb-5">
                            <span class="">Rating: ${recipeDetails.rating}</span>
                            <span>Cuisine: ${recipeDetails.cuisine}</span>
                        </div>
                        <p class="lead">${recipeDetails.ingredients}</p>
                        <p class="lead">${recipeDetails.instructions}</p>
                        <div class="d-flex">
                            <input class="form-control text-center me-3" id="servingQuantity" type="text" value="${recipeDetails.servings}" style="max-width: 3rem" />
                            <button class="btn btn-outline-dark flex-shrink-0" type="button">
                                Calories: ${recipeDetails.caloriesPerServing}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;    
    }

    viewRecipe();
