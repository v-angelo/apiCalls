<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API: Countries</title>
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <link rel="stylesheet" href="./main.css">
</head>

<body class="bg-gray-950 text-white">
    <main class="flex flex-col justify-center items-center min-h-screen mt-3">
        <h1 class="text-4xl font-semibold text-green-900 mb-7">Know More About Countries!!</h1>
        <form id="countryForm" class="flex justify-center gap-4 w-full">
            <input class="bg-slate-50 rounded text-lg text-black px-2 py-1" id="country" type="text"
                placeholder="Country Full Name" required>
            <button class="bg-blue-800 py-1 px-2 rounded cursor-pointer">Search</button>
        </form>
        <section id="countryDetails"
            class="flex flex-col items-center w-70 bg-slate-300 my-7 rounded text-black text-center overflow-hidden">
            <!-- Country data comes here -->
        </section>
    </main>
</body>
<script>
    const countryForm = document.querySelector("#countryForm");
    countryForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const country = document.querySelector("#country").value.trim().toLowerCase();

        fetch(`https://restcountries.com/v3.1/name/${country}?fullText=true`).then(response => {
            console.log(response);
            if (!response.ok) {
                // This catches 404, 500, etc.
                alert("Invalid Country Name!");
                document.querySelector("#country").value = "";
                return;
            }
            response.json().then(d => {
                const data = d[0];
                const currency = Object.keys(data.currencies);
                const currArray = currency.map(x => {
                    return `${data.currencies[x].symbol} ${data.currencies[x].name}`;
                });
                console.log(data, currArray);
                countryDetails.innerHTML = `
                    <img class="w-full" src="${data.flags.png}" alt="flag">
                    <h3 class="border-t border-black/20 w-full p-1 font-semibold text-xl">${data.name.common}</h3>
                    <h4 class="border-t border-black/20 w-full p-1">Capital: ${data.capital.join(", ")}</h4>
                    <h4 class="border-t border-black/20 w-full p-1">Population: ${data.population}</h4>
                    <h4 class="border-t border-black/20 w-full p-1">Timezone: ${data.timezones.join(", ")}</h4>
                    <h4 class="border-t border-black/20 w-full p-1">Continent: ${data.continents.join(", ")}</h4>
                    <h4 class="border-t border-black/20 w-full p-1">Languages: ${Object.values(data.languages).join(", ")}</h4>
                    <h4 class="border-t border-black/20 w-full p-1">Currency: ${currArray.join(", ")}</h4>
                    <a class="border-t border-black/20 w-full p-1 text-blue-600 underline" href="${data.maps.googleMaps}" target="_blank">View in map</a>
                `
            });
        }).catch(reason => {
            console.log(reason);
            alert("Invalid Country input!");
        });
    });    
</script>

</html>
